# Keep the pinned GitHub Actions SHAs current. Actions are pinned by full
# commit SHA (with a human-readable version comment) across the workflows, so
# they never drift on their own — Dependabot opens the bump PRs.
#
# Scope is deliberately Actions-only: the base image is referenced as
# `FROM ${BASE_IMAGE}:${BASE_TAG}-php${PHP_VER}` (ARG-interpolated), which
# Dependabot's docker manager cannot parse, and the supercronic binary bump
# (which must also recompute SUPERCRONIC_SHA256) is handled by
# check-upstream.yml.
version: 2
updates:
  - package-ecosystem: github-actions
    # "/" covers .github/workflows; the glob adds the local composite actions
    # (.github/actions/*/action.yml), which also pin third-party SHAs.
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: weekly
    # Wait a week after an upstream release before proposing the bump: a
    # compromised action release is usually yanked within days, so the
    # cooldown keeps the auto-PR out of that window (zizmor:
    # dependabot-cooldown). SHA pinning means nothing moves meanwhile.
    cooldown:
      default-days: 7
    # One grouped PR per run instead of one per action — less review churn for
    # routine SHA bumps that all land in the same workflow files.
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    labels: ["dependencies", "github-actions"]
