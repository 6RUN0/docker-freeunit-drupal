name: check-upstream

# Watch the upstreams this image pins and surface each update for review.
#
# Two lanes:
#   * bump       -- one parameterized matrix job covering the pinned Dockerfile
#                   ARGs, opening a PR per update:
#                     supercronic: bumps SUPERCRONIC_VERSION *and* recomputes
#                       SUPERCRONIC_SHA256 (the in-Dockerfile trust anchor) --
#                       the one update Dependabot/Renovate can't do out of the
#                       box.
#                     composer: bumps the pinned COMPOSER_VERSION. No checksum
#                       to recompute: the phar is GPG-verified at build time.
#   * base-image -- freeunit-php has no in-repo pin (BASE_TAG floats to
#                   `trixie`), so there is nothing to bump; instead it opens an
#                   issue when a new upstream release appears, prompting a
#                   changelog review.
#
# Note: PRs are created with the built-in GITHUB_TOKEN, and events from that token
# do NOT trigger other workflows, so ci.yml will not run automatically on a bump
# PR. Close/reopen the PR (or push an empty commit) to kick CI, which is where the
# binary is actually downloaded, checksum-verified, and built.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-upstream
  cancel-in-progress: false

jobs:
  # Every job carries a timeout-minutes cap: a hung release-feed query or
  # binary download would otherwise hold the runner for GitHub's 6-hour default.
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # push the bump branch
      pull-requests: write # open the bump PR
    strategy:
      fail-fast: false
      matrix:
        # tag_pattern is the shell `case` pattern a candidate upstream tag must
        # match before it is used anywhere (the trust boundary in the script).
        include:
          - upstream: supercronic
            repo: aptible/supercronic
            arg: SUPERCRONIC_VERSION
            tag_pattern: "v[0-9]*.[0-9]*.[0-9]*"
          - upstream: composer
            repo: composer/composer
            arg: COMPOSER_VERSION
            tag_pattern: "[0-9]*.[0-9]*.[0-9]*"
    env:
      UPSTREAM: ${{ matrix.upstream }}
      UPSTREAM_REPO: ${{ matrix.repo }}
      ARG_NAME: ${{ matrix.arg }}
      TAG_PATTERN: ${{ matrix.tag_pattern }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: check for a newer upstream release and prepare the bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Current version, single-sourced from the Dockerfile ARG. An empty
          # COMPOSER_VERSION is a meaningful state (the image tracks latest/),
          # so there is no pin to bump; for any other ARG an empty read means
          # the extraction itself broke.
          cur_version=$(sed -n "s/^ARG ${ARG_NAME}=\([^[:space:]]*\).*/\1/p" Dockerfile)
          if [ -z "$cur_version" ]; then
            case "$UPSTREAM" in
              composer)
                echo "COMPOSER_VERSION is unpinned (tracks latest/), nothing to bump"
                exit 0 ;;
              *)
                echo "could not read ARG ${ARG_NAME} from the Dockerfile" >&2
                exit 1 ;;
            esac
          fi

          # Latest stable tag. `gh release view` (no tag) returns whatever
          # GitHub flags as "Latest" -- a manual marker that is not guaranteed
          # to be the highest stable release and has no prerelease filter -- so
          # list and filter on isLatest deterministically.
          new_version=$(gh release list --repo "$UPSTREAM_REPO" \
            --exclude-pre-releases --exclude-drafts \
            --json tagName,isLatest -q 'map(select(.isLatest)) | .[0].tagName')
          : "${new_version:?could not resolve the latest upstream release}"

          # The upstream tag crosses a trust boundary into this write-scoped
          # job: it flows into sed replacement patterns, a branch name, a
          # download URL and the PR body. Reject anything that does not match
          # this upstream's expected tag shape before any of that, so a crafted
          # tag can't break the sed delimiter or smuggle shell/URL
          # metacharacters downstream.
          # shellcheck disable=SC2254 # the unquoted expansion IS the pattern
          case "$new_version" in
            $TAG_PATTERN) : ;;
            *) echo "refusing unexpected upstream tag: $new_version" >&2; exit 1 ;;
          esac
          echo "current version: $cur_version"
          echo "latest version:  $new_version"
          if [ "$new_version" = "$cur_version" ]; then
            echo "up to date, nothing to do"
            exit 0
          fi

          branch="chore/${UPSTREAM}-${new_version}"
          if gh pr list --head "$branch" --state open --json number -q '.[].number' | grep -q .; then
            echo "a bump PR for $new_version is already open ($branch), skipping"
            exit 0
          fi

          # Patch the ARG(s) and assemble the per-upstream commit/PR wording.
          # supercronic: download the amd64 binary for the new release and
          # recompute its SHA256 -- mirroring how the Dockerfile fetches and
          # verifies the asset at build time; the digest becomes the new pinned
          # trust anchor. composer: version-only -- the phar is GPG-verified
          # against the pinned signing key at build time, so no checksum to
          # recompute.
          if [ "$UPSTREAM" = supercronic ]; then
            work=$(mktemp -d)
            curl -fsSL --retry 3 --retry-connrefused \
              -o "$work/supercronic-linux-amd64" \
              "https://github.com/aptible/supercronic/releases/download/${new_version}/supercronic-linux-amd64"
            new_sha256=$(sha256sum "$work/supercronic-linux-amd64" | cut -d' ' -f1)
            : "${new_sha256:?could not compute SHA256 of the downloaded binary}"
            echo "new sha256: $new_sha256"
            rm -rf "$work"
            sed -i \
              -e "s|^ARG SUPERCRONIC_VERSION=.*|ARG SUPERCRONIC_VERSION=${new_version}|" \
              -e "s|^ARG SUPERCRONIC_SHA256=.*|ARG SUPERCRONIC_SHA256=${new_sha256}|" \
              Dockerfile
            commit_body="Bumps the pinned supercronic binary this image installs.

          - SUPERCRONIC_VERSION: ${cur_version} -> ${new_version}
          - SUPERCRONIC_SHA256 recomputed from the new release's supercronic-linux-amd64"
            pr_intro="Automated bump of the pinned supercronic binary."
            table_rows="| \`SUPERCRONIC_VERSION\` | \`${cur_version}\` | \`${new_version}\` |
          | \`SUPERCRONIC_SHA256\` | (recomputed) | \`${new_sha256}\` |"
            pr_note="The new digest was computed from the \`supercronic-linux-amd64\` asset of the [${new_version} release](https://github.com/aptible/supercronic/releases/tag/${new_version})."
            ci_note=", which downloads and checksum-verifies the binary"
          else
            sed -i \
              -e "s|^ARG COMPOSER_VERSION=.*|ARG COMPOSER_VERSION=${new_version}|" \
              Dockerfile
            commit_body="Bumps the pinned Composer release this image installs.

          - COMPOSER_VERSION: ${cur_version} -> ${new_version}
          - The phar stays GPG-verified against the pinned signing key at build time."
            pr_intro="Automated bump of the pinned Composer release."
            table_rows="| \`COMPOSER_VERSION\` | \`${cur_version}\` | \`${new_version}\` |"
            pr_note="The phar is GPG-verified against the pinned signing key at build time, so this bump only moves the version. See the [${new_version} release](https://github.com/composer/composer/releases/tag/${new_version})."
            ci_note=""
          fi

          if git diff --quiet -- Dockerfile; then
            echo "Dockerfile unchanged after patch, nothing to commit"
            exit 0
          fi

          # Commit on a fresh branch and open the PR.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Dockerfile
          git commit -m "build(deps): bump ${UPSTREAM} to ${new_version}

          ${commit_body}"
          # Authenticate the push through gh's git credential helper, which
          # reads GH_TOKEN from the environment. checkout ran with
          # persist-credentials: false, so origin carries no token; this keeps
          # the token out of the remote URL (and thus out of this process's
          # argv / the process table).
          gh auth setup-git
          git push origin "HEAD:${branch}"

          # --base: the PR targets the branch this workflow ran from. On the
          # weekly schedule that is the repository's DEFAULT branch (main) --
          # so bump PRs land where release tags are cut. Trigger the workflow
          # via workflow_dispatch from another branch (e.g. develop) to direct
          # a bump there instead.
          gh pr create \
            --head "$branch" \
            --base "${GITHUB_REF_NAME}" \
            --title "build(deps): bump ${UPSTREAM} to ${new_version}" \
            --body "${pr_intro}

          | arg | from | to |
          | --- | --- | --- |
          ${table_rows}

          ${pr_note}

          > [!IMPORTANT]
          > CI does not run automatically on this PR (it was opened with \`GITHUB_TOKEN\`). Close/reopen it or push an empty commit to trigger the build + smoke matrix${ci_note}." \
            --label dependencies

  base-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # read the gh release feed
      issues: write # open the heads-up issue
    steps:
      - name: check for a newer freeunit-php base release and open an issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # BASE_TAG floats to `trixie`, so the image already tracks new base
          # builds -- there is no in-repo pin to bump. A new *tagged* upstream
          # release still warrants a changelog read (and a possible BASE_TAG pin),
          # so surface it as an issue rather than a PR.
          new_version=$(gh release list --repo 6RUN0/docker-freeunit-php \
            --exclude-pre-releases --exclude-drafts \
            --json tagName,isLatest -q 'map(select(.isLatest)) | .[0].tagName')
          : "${new_version:?could not resolve the latest upstream release}"

          # Validate the tag before it reaches the issue title/body (same trust
          # boundary as the bump watcher, even though nothing here runs it).
          case "$new_version" in
            v[0-9]*.[0-9]*.[0-9]*) : ;;
            *) echo "refusing unexpected upstream tag: $new_version" >&2; exit 1 ;;
          esac
          echo "latest base release: $new_version"

          # Dedup across ANY state: if a maintainer closed the issue (declining to
          # act on this release) don't reopen the same heads-up every week.
          if gh issue list --state all --search "freeunit-php ${new_version} in:title" \
              --json number -q '.[].number' | grep -q .; then
            echo "an issue for $new_version already exists, skipping"
            exit 0
          fi

          gh issue create \
            --title "base image update available: freeunit-php ${new_version}" \
            --body "A new \`freeunit-php\` release is available: [${new_version}](https://github.com/6RUN0/docker-freeunit-php/releases/tag/${new_version}).

          \`BASE_TAG\` floats to \`trixie\`, so the build already picks up new base builds carrying that suite tag — but a new tagged release is worth a look:

          - Review the [release notes](https://github.com/6RUN0/docker-freeunit-php/releases/tag/${new_version}) for behaviour/security changes.
          - Re-run the build + smoke matrix to confirm this image still builds on the refreshed substrate.
          - If you pin \`BASE_TAG\` for reproducibility, consider moving the pin to the build tag shipped with this release.

          This issue was opened automatically by the \`check-upstream\` workflow."
