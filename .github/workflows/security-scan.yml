name: security-scan

# Weekly CVE re-scan of the *published* images. ci.yml only scans on push/PR, so
# a vulnerability disclosed in the Debian base or the sury PHP packages after a
# release would go unnoticed until the next build. This re-scans what is actually
# in GHCR and uploads the results to code scanning, so they surface in the
# Security tab. Report-only: base/sury CVEs are outside this repo's control.
on:
  schedule:
    - cron: "41 6 * * 2" # Tuesdays 06:41 UTC (offset from check-upstream's Monday)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  # Single source for the PHP matrix: the Makefile's PHP_VERSIONS (see ci.yml).
  php-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      php: ${{ steps.read.outputs.php }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: read the php matrix from the Makefile
        id: read
        run: echo "php=$(make print-php-matrix)" >> "$GITHUB_OUTPUT"

  trivy:
    needs: php-matrix
    runs-on: ubuntu-latest
    # Cap a hung image pull/scan well below GitHub's 6-hour default.
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read # pull the image to scan (works for a private GHCR package too)
      security-events: write # upload the SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(needs.php-matrix.outputs.php) }}
    env:
      PHP: ${{ matrix.php }}
    steps:
      # Checkout is needed only to resolve the local ./.github/actions/* used
      # below (a `uses: ./...` step runs from the workspace copy).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Single-source the registry path from the repo owner (lowercased, as GHCR
      # requires); scan the floating per-PHP tag, i.e. the newest published image.
      - name: derive image ref
        run: |
          owner=${GITHUB_REPOSITORY_OWNER,,}
          echo "IMAGE_REF=ghcr.io/${owner}/freeunit-drupal:trixie-php${PHP}" >> "$GITHUB_ENV"

      - name: log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: trivy scan published image + SARIF upload
        uses: ./.github/actions/trivy-sarif
        with:
          image-ref: ${{ env.IMAGE_REF }}
          category: trivy-published-php${{ matrix.php }}
