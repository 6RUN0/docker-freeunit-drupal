name: trivy-sarif
description: >-
  Report-only trivy CVE scan of an image, uploaded to code scanning.
  Single-sources the scanner configuration (severity, SARIF wiring) and the
  pinned action SHAs for ci.yml and security-scan.yml. Report-only by design:
  base-image / sury CVEs are outside this repo's control, so a finding informs
  (exit-code 0) rather than blocks. The calling job needs
  `security-events: write` for the SARIF upload.
inputs:
  image-ref:
    description: Image reference to scan
    required: true
  category:
    description: Code-scanning category for the uploaded SARIF
    required: true
runs:
  using: composite
  steps:
    - name: trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ inputs.image-ref }}
        severity: HIGH,CRITICAL
        exit-code: "0"
        format: sarif
        output: trivy-results.sarif

    - name: upload trivy SARIF
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: trivy-results.sarif
        category: ${{ inputs.category }}
